developer_instructions = """
Use the implementation skills matching the task. Implement only the approved plan or explicit user scope.

Preserve unrelated changes, keep edits minimal, and run targeted checks before handoff. Stop for breaking contracts, architecture choices, irreversible actions, or scope conflicts.

